<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dome Visualizers</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161c24; --panel2:#1d2530; --line:#2a3441;
    --text:#e6edf3; --muted:#8b97a7; --accent:#4aa3ff;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);padding:24px;gap:8px}
  h1{font-size:24px;margin:0}
  p{color:var(--muted);margin:0 0 24px;text-align:center}
  .cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:760px}
  a.card{display:flex;flex-direction:column;gap:6px;text-decoration:none;color:var(--text);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 24px;
    width:340px;transition:border-color .15s,transform .15s}
  a.card:hover{border-color:var(--accent);transform:translateY(-2px)}
  a.card .t{font-size:17px;font-weight:600}
  a.card .d{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
  <h1>Dome Visualizers</h1>
  <p>Glass dome &amp; hexagon frame tools</p>
  <div class="cards">
    <a class="card" href="dome_pyramid_visualizer.html">
      <span class="t">Pyramid — 3D Visualizer</span>
      <span class="d">Interactive 3D hexagon pyramid &amp; glass dome</span>
    </a>
    <a class="card" href="dome_hexagon_visualizer.html">
      <span class="t">Hexagon Frame Visualizer</span>
      <span class="d">2D glass dome &amp; hexagon frame layout</span>
    </a>
  </div>
</body>
</html>
